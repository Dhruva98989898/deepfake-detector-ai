<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Deepfake Detector</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>AI Deepfake Detector</h1>

<p>

Upload a video and let AI analyze it.

</p>

<form
action="/detect"
method="POST"
enctype="multipart/form-data">

<input
type="file"
name="video"
accept="video/*"
required>

<br><br>

<button type="submit">

Analyze Video

</button>

</form>

</div>

</body>

</html>
